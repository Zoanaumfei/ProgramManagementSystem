spring:
  application:
    name: ProgramManagementSystem
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/program_management_system}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      pool-name: ProgramManagementSystemPool
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:5000}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER_URI:https://cognito-idp.sa-east-1.amazonaws.com/sa-east-1_aA4I3tEmF}

app:
  bootstrap:
    seed-data: ${APP_BOOTSTRAP_SEED_DATA:true}
    internal-admin:
      enabled: ${APP_BOOTSTRAP_INTERNAL_ADMIN_ENABLED:false}
      email: ${APP_BOOTSTRAP_INTERNAL_ADMIN_EMAIL:}
      display-name: ${APP_BOOTSTRAP_INTERNAL_ADMIN_DISPLAY_NAME:}
      prune-other-internal-users: ${APP_BOOTSTRAP_INTERNAL_ADMIN_PRUNE_OTHER_INTERNAL_USERS:false}
      password: ${APP_BOOTSTRAP_INTERNAL_ADMIN_PASSWORD:}
      temporary-password: ${APP_BOOTSTRAP_INTERNAL_ADMIN_TEMPORARY_PASSWORD:}
  security:
    cognito:
      issuer-uri: ${COGNITO_ISSUER_URI:https://cognito-idp.sa-east-1.amazonaws.com/sa-east-1_aA4I3tEmF}
      jwk-set-uri: ${COGNITO_JWK_SET_URI:https://cognito-idp.sa-east-1.amazonaws.com/sa-east-1_aA4I3tEmF/.well-known/jwks.json}
      app-client-id: ${COGNITO_APP_CLIENT_ID:rv7hk9nkugspb3i4p269sv828}
      app-client-secret: ${COGNITO_APP_CLIENT_SECRET:}
      allowed-origins:
        - ${APP_ALLOWED_ORIGIN_LOCAL:http://localhost:3000}
        - ${APP_ALLOWED_ORIGIN_WEB:https://oryzem.com}
    identity:
      provider: ${APP_SECURITY_IDENTITY_PROVIDER:stub}
      user-pool-id: ${APP_SECURITY_IDENTITY_USER_POOL_ID:}
      region: ${APP_SECURITY_IDENTITY_REGION:${AWS_REGION:sa-east-1}}
  multitenancy:
    offboarding:
      retention-days: ${APP_MULTITENANCY_OFFBOARDING_RETENTION_DAYS:30}
    rate-limit:
      window-seconds: ${APP_MULTITENANCY_RATE_LIMIT_WINDOW_SECONDS:60}
      internal-max-requests: ${APP_MULTITENANCY_RATE_LIMIT_INTERNAL_MAX_REQUESTS:240}
      standard-max-requests: ${APP_MULTITENANCY_RATE_LIMIT_STANDARD_MAX_REQUESTS:120}
      enterprise-max-requests: ${APP_MULTITENANCY_RATE_LIMIT_ENTERPRISE_MAX_REQUESTS:300}
    quota:
      internal:
        max-organizations: ${APP_MULTITENANCY_QUOTA_INTERNAL_MAX_ORGANIZATIONS:1000}
        max-markets: ${APP_MULTITENANCY_QUOTA_INTERNAL_MAX_MARKETS:1000}
        max-active-memberships: ${APP_MULTITENANCY_QUOTA_INTERNAL_MAX_ACTIVE_MEMBERSHIPS:10000}
      standard:
        max-organizations: ${APP_MULTITENANCY_QUOTA_STANDARD_MAX_ORGANIZATIONS:20}
        max-markets: ${APP_MULTITENANCY_QUOTA_STANDARD_MAX_MARKETS:10}
        max-active-memberships: ${APP_MULTITENANCY_QUOTA_STANDARD_MAX_ACTIVE_MEMBERSHIPS:250}
      enterprise:
        max-organizations: ${APP_MULTITENANCY_QUOTA_ENTERPRISE_MAX_ORGANIZATIONS:200}
        max-markets: ${APP_MULTITENANCY_QUOTA_ENTERPRISE_MAX_MARKETS:50}
        max-active-memberships: ${APP_MULTITENANCY_QUOTA_ENTERPRISE_MAX_ACTIVE_MEMBERSHIPS:5000}

logging:
  level:
    com.oryzem.programmanagementsystem.security: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      access: read-only
    info:
      access: read-only
    metrics:
      access: read-only
  health:
    db:
      enabled: true

spring:
  config:
    activate:
      on-profile: rds
  datasource:
    url: ${DB_URL:jdbc:postgresql://program-management-system-db.cns8u4awye4v.sa-east-1.rds.amazonaws.com:5432/program_management_system}
    username: ${DB_USERNAME:pms_admin}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:15}
      minimum-idle: ${DB_MIN_IDLE:5}
      data-source-properties:
        sslmode: ${DB_SSL_MODE:require}
        tcpKeepAlive: true
  flyway:
    clean-disabled: true

app:
  bootstrap:
    seed-data: ${APP_BOOTSTRAP_SEED_DATA:false}
  rds:
    secret:
      enabled: ${DB_SECRET_ENABLED:true}
      secret-id: ${DB_SECRET_ID:program-management-system/rds/master}
      region: ${AWS_REGION:sa-east-1}
      fail-fast: ${DB_SECRET_FAIL_FAST:true}

spring:
  datasource:
    url: jdbc:h2:mem:programmanagementsystem;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://cognito-idp.sa-east-1.amazonaws.com/sa-east-1_aA4I3tEmF

app:
  bootstrap:
    seed-data: true
  portfolio:
    documents:
      provider: stub
      bucket-name: stub-bucket
      key-prefix: portfolio-test
      presign-duration-minutes: 15
      region: sa-east-1
  security:
    cognito:
      issuer-uri: https://cognito-idp.sa-east-1.amazonaws.com/sa-east-1_aA4I3tEmF
      jwk-set-uri: https://cognito-idp.sa-east-1.amazonaws.com/sa-east-1_aA4I3tEmF/.well-known/jwks.json
      app-client-id: rv7hk9nkugspb3i4p269sv828
      allowed-origins:
        - http://localhost:3000
        - https://oryzem.com
